name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: experimental-features = nix-command flakes
      - name: Build modsets
        run: nix build --no-write-lock-file .#all --out-link result
      - name: Pack modsets
        run: tar -C result -czf terraria-modsets.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: terraria-modsets
          path: terraria-modsets.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: terraria-modsets
          path: dist
      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Built from $GITHUB_SHA."
          gh release upload "$GITHUB_REF_NAME" dist/terraria-modsets.tar.gz --clobber
